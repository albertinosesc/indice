<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca TXT Pro</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1565c0" />
</head>
<body>

  <header>
    <div class="header-left">
      <img src="assets/logo.png" alt="Logo" class="logo" />
      <span>Biblioteca TXT Pro</span>
    </div>
    <div class="header-right">
      <button id="btnTheme" title="Alternar tema">🌓</button>
      <button id="btnStats" title="Estatísticas">📊</button>
    </div>
  </header>

  <div id="principal">
    <aside id="menu">
      <div class="menu-toolbar">
        <button id="btnOpenFolder">📂 Abrir Pasta</button>
        <button id="btnNewFile">➕</button>
        <button id="btnGitHubConfig" title="Configurar GitHub">🔑</button>
      </div>
      <input id="pesquisa" placeholder="🔍 Pesquisar arquivos..." />
      <div id="lista-arquivos"></div>
      <div class="menu-footer">
        <span id="contador-arquivos">0 arquivos</span>
        <span id="pasta-atual"></span>
      </div>
    </aside>

    <main id="conteudo">
      <div id="barra-ferramentas">
        <button id="btnSave">💾 Salvar</button>
        <button id="btnRename">✏️ Renomear</button>
        <button id="btnDelete">🗑️ Excluir</button>
        <button id="btnFavorite">⭐ Favoritar</button>
        <button id="btnExportPDF">📄 PDF</button>
        <button id="btnExportZIP">📦 ZIP</button>
        <button id="btnBackup">💽 Backup</button>
        <!-- NOVOS BOTÕES GITHUB -->
        <button id="btnGitHubPush">🚀 Enviar para GitHub</button>
        <button id="btnGitHubPull">📥 Puxar do GitHub</button>
        <button id="btnGitHubSync">🔄 Sincronizar</button>
      </div>
      <div id="editor-wrapper">
        <textarea id="editor" placeholder="Selecione ou crie um arquivo para começar..."></textarea>
      </div>
      <div id="info-arquivo">
        <span id="nome-arquivo"></span>
        <span id="stats-arquivo"></span>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
